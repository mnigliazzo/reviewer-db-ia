services:
  ollama:
    image: ${DOCKER_REGISTRY}${DOCKER_REGISTRY:+:}${DOCKER_REGISTRY_PULL_PORT}${DOCKER_REGISTRY_PULL_PORT:+/}ollama/ollama:latest
    profiles:
      - ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-16384}
    volumes:
      - ${VOLUME_OLLAMA:-ollama_data}:/root/.ollama

  reviewer:
    image: ${DOCKER_REGISTRY}${DOCKER_REGISTRY:+:}${DOCKER_REGISTRY_PUSH_PORT}${DOCKER_REGISTRY_PUSH_PORT:+/}dba/reviewer-db-ia
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DOCKER_REGISTRY=${DOCKER_REGISTRY}${DOCKER_REGISTRY:+:}${DOCKER_REGISTRY_PULL_PORT}
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    command: >
      python -m src.main
      --log-level ${LOG_LEVEL:-INFO}
      --scripts-path /app/scripts_review
      --provider ${PROVIDER:-ollama}
      --base-url ${MODEL_BASE_URL}
      --model-agent ${MODEL_AGENTS}
      --max-tool-rounds ${REVIEWER_MAX_TOOL_ROUNDS:-0}
      --max-schema-scripts ${REVIEWER_MAX_SCHEMA_SCRIPTS:-0}

    volumes:
      - ${REVIEW_SCRIPTS_PATH}:/app/scripts_review


volumes:
  ollama_data:
